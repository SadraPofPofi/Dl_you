name: 01- 🎬 Youtube Downloader - small files

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."

          docker network create warp-net || true

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize (30 seconds)..."
          sleep 30

          echo "Checking WARP status..."
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/10 - WARP not ready yet, waiting..."
              sleep 10
            fi
          done

          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # FIX: Added p7zip-full for reliable cross-platform archives (replaces zip for split/password use)
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip

          # Install Deno (JS runtime required by yt-dlp for YouTube n-challenge solving)
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version

          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_MB=90
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          # Create safe backup location for our files
          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          mkdir -p videos tmp_downloads

          echo "AVASAM YouTube Downloader"
          echo "https://avasam.ir"
          echo ""
          echo "Downloading: $URL"
          echo "Quality: $QUALITY"
          echo "Backup dir: $BACKUP_DIR"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/　/-/g' | tr -s '-'
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          case "$QUALITY" in
            "audio")
              FORMAT="bestaudio"
              ;;
            "best")
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              ;;
            "1080")
              FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best"
              ;;
            "720")
              FORMAT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best"
              ;;
            "480")
              FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best"
              ;;
            *)
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              ;;
          esac

          COMMON_FLAGS="--merge-output-format mp4 --output tmp_downloads/%(title)s.%(ext)s --no-part --no-playlist --retries 10 --fragment-retries 10 --no-check-certificates"

          download_video() {
            local METHOD=$1
            echo "Trying download method $METHOD..."

            case $METHOD in
              1)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=mweb" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
              2)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=android" \
                  --user-agent "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
              3)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=mweb,android" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
              4)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=web" \
                  --js-runtimes deno \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                  --add-header "Accept-Language:en-US,en;q=0.9" \
                  "$URL"
                ;;
              5)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=android_vr" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
              6)
                yt-dlp \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=mweb" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
              7)
                yt-dlp \
                  --format "$FORMAT" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=android" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
              8)
                yt-dlp \
                  --proxy "socks5://127.0.0.1:1080" \
                  --format "bestvideo+bestaudio/best" \
                  $COMMON_FLAGS \
                  --extractor-args "youtube:player_client=mweb,android,android_vr" \
                  --concurrent-fragments 4 \
                  "$URL"
                ;;
            esac
          }

          DOWNLOAD_SUCCESS=false
          for METHOD in 1 2 3 4 5 6 7 8; do
            if download_video $METHOD; then
              DOWNLOAD_SUCCESS=true
              echo "Download successful with method $METHOD!"
              break
            else
              echo "Method $METHOD failed, waiting before next attempt..."
              sleep $((RANDOM % 10 + 5))
            fi
          done

          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "All download methods failed!"
            exit 1
          fi

          find tmp_downloads -name "*.part" -delete

          echo "Download complete!"
          echo "Files in tmp_downloads:"
          ls -la tmp_downloads/

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"

            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          > /tmp/video_info.txt

          FILE_INDEX=0
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            FILENAME_NO_EXT="${BASENAME%.*}"
            EXT="${BASENAME##*.}"
            FILE_INDEX=$((FILE_INDEX + 1))

            FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")

            echo "Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"
            echo "Sanitized name: $FILENAME_NO_EXT"

            FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")

            mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
            echo "Created backup folder: $BACKUP_DIR/${FINAL_FOLDER_NAME}"

            echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt

            TEMP_NAME="video_${FILE_INDEX}"
            FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "Splitting $BASENAME into ${SPLIT_MB}MB parts..."

              # ============================================================
              # FIX: Use 7z instead of zip -s for split archives.
              # The Linux `zip -s` command produces split archives that many
              # extraction tools (Windows Explorer, older WinRAR) incorrectly
              # treat as password-protected. 7z handles splits cleanly and
              # is fully cross-platform compatible.
              # ============================================================

              ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"

              if [ -n "$ZIP_PASSWORD" ]; then
                # Password-protected split archive with AES-256 encryption
                7z a \
                  -v${SPLIT_MB}m \
                  -p"${ZIP_PASSWORD}" \
                  -mhe=on \
                  -mx=0 \
                  "${ARCHIVE_BASE}.7z" \
                  "$FILE"
              else
                # No password - plain split archive, no encryption headers
                7z a \
                  -v${SPLIT_MB}m \
                  -mx=0 \
                  "${ARCHIVE_BASE}.7z" \
                  "$FILE"
              fi

              PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.7z* 2>/dev/null | wc -l)
              echo "Created $PART_COUNT parts"

              TOTAL_SIZE=0
              for part_file in "$BACKUP_DIR/${FINAL_FOLDER_NAME}"/*; do
                if [ -f "$part_file" ]; then
                  PART_SIZE=$(stat -c%s "$part_file")
                  TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                fi
              done
              TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

              DOWNLOAD_LINKS_MD=""
              LINK_NUM=0
              for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.7z* 2>/dev/null | sort); do
                if [ -f "$part_file" ]; then
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(urlencode "${PART_BASENAME}")
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                  LINK_NUM=$((LINK_NUM + 1))
                  DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                fi
              done

              README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
              {
                printf '%s\n' "# ${FILENAME_NO_EXT}"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## Video Information"
                printf '%s\n' ""
                printf '%s\n' "| Property | Value |"
                printf '%s\n' "|----------|-------|"
                printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                printf '%s\n' "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                printf '%s\n' "| **Quality** | **${QUALITY}** |"
                printf '%s\n' "| **Status** | **Complete (100%)** |"
                if [ -n "$ZIP_PASSWORD" ]; then
                  printf '%s\n' "| **Password Protected** | **YES** |"
                else
                  printf '%s\n' "| **Password Protected** | **NO** |"
                fi
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## Download Links"
                printf '%s\n' ""
                printf '%s\n' "| # | File | Link |"
                printf '%s\n' "|---|------|------|"
                printf '%s' "${DOWNLOAD_LINKS_MD}"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## How to Extract"
                printf '%s\n' ""
                printf '%s\n' "1. **Download** all parts (e.g. \`.7z.001\`, \`.7z.002\`...)"
                printf '%s\n' "2. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)"
                printf '%s\n' "3. **Right-click** the \`.7z.001\` file → Extract Here"
                printf '%s\n' "4. All parts combine automatically into the original video"
                if [ -n "$ZIP_PASSWORD" ]; then
                  printf '%s\n' "5. Enter the password when prompted"
                fi
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
              } > "$README_FILE"

              echo "Created README.md"

            else
              if [ -n "$ZIP_PASSWORD" ]; then
                echo "$BASENAME - creating password-protected 7z archive"

                # FIX: Use 7z instead of zip for consistent password behavior
                7z a \
                  -p"${ZIP_PASSWORD}" \
                  -mhe=on \
                  -mx=0 \
                  "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.7z" \
                  "$FILE"

                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.7z")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                  printf '%s\n' "| **Total Size** | **1 archive** - **${SIZE_MB} MB** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  printf '%s\n' "| **Password Protected** | **YES** |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Link"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s\n' "| 1 | \`${FINAL_FOLDER_NAME}.7z\` | [Download](${RAW_LINK}) |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)"
                  printf '%s\n' "2. **Right-click** the \`.7z\` file → Extract Here"
                  printf '%s\n' "3. Enter the password when prompted"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"

                echo "Created password-protected 7z archive and README.md"

              else
                echo "$BASENAME - copying mp4 directly (no archive needed)"

                cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.${EXT}"

                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}.${EXT}")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

                README_FILE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${FILENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Video Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Video Name** | \`${FILENAME_NO_EXT}\` |"
                  printf '%s\n' "| **Original Link** | [YouTube Video](${URL}) |"
                  printf '%s\n' "| **Total Size** | **1 file** (no split) - **${SIZE_MB} MB** |"
                  printf '%s\n' "| **Quality** | **${QUALITY}** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  printf '%s\n' "| **Password Protected** | **NO** |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Link"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s\n' "| 1 | \`${FINAL_FOLDER_NAME}.${EXT}\` | [Download](${RAW_LINK}) |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "Ready to use - no extraction needed!"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"

                echo "Copied mp4 and created README.md"
              fi
            fi
          done

          rm -rf tmp_downloads

          echo ""
          echo "===== Backup folder contents ====="
          find "$BACKUP_DIR" -type f | head -50
          echo "===== Video info file ====="
          cat /tmp/video_info.txt

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "AVASAM (https://avasam.ir) - Preparing to commit files"

          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          echo "Backup directory: $BACKUP_DIR"

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          echo "Files in backup: $BACKUP_FILE_COUNT"

          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "ERROR: No files in backup directory!"
            exit 1
          fi

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          regenerate_master_readme() {
            MASTER_README="videos/README.md"

            echo "Regenerating master README..."

            {
              echo "# DOWNLOADED VIDEOS LIST :"
              echo ""
              echo "----"
              echo ""
            } > "$MASTER_README"

            VIDEO_EMOJIS=("🎬" "🎥" "📽️" "🎞️" "📺" "🎦" "🎭" "🎪" "🎯" "🎮" "🎵" "🎶" "🎸" "🎹" "🎤")

            NUM=0

            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue

              NUM=$((NUM + 1))
              RANDOM_EMOJI="${VIDEO_EMOJIS[$RANDOM % ${#VIDEO_EMOJIS[@]}]}"
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              FOLDER_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENCODED}"

              printf -- "- %s - %s [%s](%s)\n" "$NUM" "$RANDOM_EMOJI" "$FOLDER_NAME" "$FOLDER_LINK" >> "$MASTER_README"
            done

            echo "Master README regenerated with $NUM videos"
          }

          push_with_retry() {
            local MAX_RETRIES=20
            local RETRY=0

            while [ $RETRY -lt $MAX_RETRIES ]; do
              RETRY=$((RETRY + 1))
              echo ""
              echo "========== Push attempt $RETRY of $MAX_RETRIES =========="

              echo "Fetching and resetting to remote..."
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"

              echo "Copying backup files to videos folder..."
              mkdir -p videos
              cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true

              regenerate_master_readme

              echo "Files to be added:"
              find videos -type f -newer /tmp/backup_dir_path.txt 2>/dev/null | head -20 || true

              git add -A videos/

              if git diff --cached --quiet; then
                echo "No new changes to commit (files might already exist)"
                return 0
              fi

              echo "Committing..."
              git commit -m "[AVASAM] YouTube download [skip ci]"

              echo "Pushing..."
              if git push origin HEAD:"$BRANCH" 2>&1; then
                echo "Push successful!"
                return 0
              else
                WAIT_TIME=$((3 + RANDOM % 10))
                echo "Push failed (probably another workflow pushed). Waiting ${WAIT_TIME}s..."
                sleep $WAIT_TIME
              fi
            done

            echo "ERROR: All push attempts failed!"
            return 1
          }

          push_with_retry

          echo ""
          echo "All files pushed successfully - AVASAM (https://avasam.ir)"
