name: 01- 🎬 Youtube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start WARP Container
        run: |
          echo "🚀 Starting Cloudflare WARP container..."

          # Create docker network
          docker network create warp-net || true

          # Run WARP container
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "⏳ Waiting for WARP to initialize (30 seconds)..."
          sleep 30

          # Check WARP status
          echo "🔍 Checking WARP status..."
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            else
              echo "⏳ Attempt $i/10 - WARP not ready yet, waiting..."
              sleep 10
            fi
          done

          # Final check
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "✅ WARP proxy is ready!"
          else
            echo "⚠️ WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip curl jq bc
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SPLIT_MB=90
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          mkdir -p videos tmp_downloads

          echo "🏷️  AVASAM YouTube Downloader"
          echo "🌐 https://avasam.ir"
          echo ""
          echo "📹 Downloading: $URL"
          echo "📊 Quality: $QUALITY"

          # Set format based on quality
          case "$QUALITY" in
            "audio")
              FORMAT="bestaudio"
              ;;
            "best")
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              ;;
            "1080")
              FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best"
              ;;
            "720")
              FORMAT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best"
              ;;
            "480")
              FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best"
              ;;
            *)
              FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
              ;;
          esac

          # Download through WARP SOCKS5 proxy
          yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            --format "$FORMAT" \
            --merge-output-format mp4 \
            --output "tmp_downloads/%(title)s.%(ext)s" \
            --no-playlist \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 4 \
            --no-check-certificates \
            --prefer-free-formats \
            --no-warnings \
            "$URL" || {
              echo "❌ yt-dlp failed, trying alternative method..."

              # Try with different user agent
              yt-dlp \
                --proxy "socks5://127.0.0.1:1080" \
                --format "$FORMAT" \
                --merge-output-format mp4 \
                --output "tmp_downloads/%(title)s.%(ext)s" \
                --no-playlist \
                --retries 10 \
                --fragment-retries 10 \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                --extractor-args "youtube:player_client=android" \
                "$URL"
            }

          echo "✅ Download complete!"
          ls -la tmp_downloads/

          # Get repository info for raw file links
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          # Handle file splitting
          FILE_INDEX=0
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            # Remove extension for folder name
            FILENAME_NO_EXT="${BASENAME%.*}"
            EXT="${BASENAME##*.}"
            FILE_INDEX=$((FILE_INDEX + 1))

            echo "📁 Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "✂️ Splitting $BASENAME into ${SPLIT_MB}MB parts..."

              # Create folder for split files using the original filename (without extension)
              mkdir -p "videos/${FILENAME_NO_EXT}"

              # Use a simple temp name to avoid special character issues with zip -s
              TEMP_NAME="temparchive${FILE_INDEX}"

              # Copy file to a temp location with simple name
              cp "$FILE" "tmp_downloads/${TEMP_NAME}.${EXT}"

              # Create split archive in tmp_downloads with simple name
              cd tmp_downloads
              zip -0 -s "${SPLIT_MB}m" "${TEMP_NAME}.zip" "${TEMP_NAME}.${EXT}"

              # Move and rename all parts to the destination folder with original name
              PART_FILES=()
              for part in ${TEMP_NAME}.z* ${TEMP_NAME}.zip; do
                if [ -f "$part" ]; then
                  # Get the extension (z01, z02, zip, etc)
                  PART_EXT="${part##*.}"
                  mv "$part" "../videos/${FILENAME_NO_EXT}/${FILENAME_NO_EXT}.${PART_EXT}"
                  PART_FILES+=("${FILENAME_NO_EXT}.${PART_EXT}")
                  echo "  📦 Created: ${FILENAME_NO_EXT}.${PART_EXT}"
                fi
              done

              # Clean up temp file
              rm -f "${TEMP_NAME}.${EXT}"
              cd ..

              PART_COUNT=$(ls "videos/${FILENAME_NO_EXT}/" 2>/dev/null | wc -l)
              echo "✅ Created $PART_COUNT parts in videos/${FILENAME_NO_EXT}/"

              # Calculate total size of all parts
              TOTAL_SIZE=0
              for part_file in "videos/${FILENAME_NO_EXT}"/*; do
                if [ -f "$part_file" ]; then
                  PART_SIZE=$(stat -c%s "$part_file")
                  TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                fi
              done
              TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

              # Generate download links
              DOWNLOAD_LINKS=""
              FOLDER_ENCODED=$(echo "${FILENAME_NO_EXT}" | sed 's/ /%20/g')
              for part_file in "videos/${FILENAME_NO_EXT}"/*; do
                if [ -f "$part_file" ]; then
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(echo "${PART_BASENAME}" | sed 's/ /%20/g')
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                  DOWNLOAD_LINKS="${DOWNLOAD_LINKS}${RAW_LINK}"$'\n'
                fi
              done

              # Create info file using printf
              INFO_FILE="videos/${FILENAME_NO_EXT}/INFO.txt"
              {
                printf '%s\n' "╔══════════════════════════════════════════════════════════════════╗"
                printf '%s\n' "║                    🎬 AVASAM YouTube Downloader                   ║"
                printf '%s\n' "║                       https://avasam.ir                           ║"
                printf '%s\n' "╚══════════════════════════════════════════════════════════════════╝"
                printf '\n'
                printf '%s\n' "📹 VIDEO INFORMATION"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '\n'
                printf '%s\n' "1️⃣  Video Name"
                printf '%s\n' "    ${FILENAME_NO_EXT}"
                printf '\n'
                printf '%s\n' "2️⃣  Original YouTube Link"
                printf '%s\n' "    ${URL}"
                printf '\n'
                printf '%s\n' "3️⃣  Total Downloaded Size"
                printf '%s\n' "    📦 ${PART_COUNT} zip parts | 💾 Total: ${TOTAL_SIZE_MB} MB"
                printf '\n'
                printf '%s\n' "4️⃣  Video Quality"
                printf '%s\n' "    🎯 ${QUALITY}"
                printf '\n'
                printf '%s\n' "5️⃣  Download Links (GitHub Raw)"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '%s' "${DOWNLOAD_LINKS}"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '\n'
                printf '%s\n' "6️⃣  Download Status"
                printf '%s\n' "    ✅ 100% Downloaded - Complete!"
                printf '\n'
                printf '%s\n' "    Progress: [████████████████████] 100%"
                printf '\n'
                printf '%s\n' "    ✅ All parts downloaded successfully!"
                printf '%s\n' "    ✅ Files are ready to use!"
                printf '\n'
                printf '%s\n' "    📋 How to extract"
                printf '%s\n' "    • Download all .zip and .z01, .z02... files"
                printf '%s\n' "    • Use 7-Zip or WinRAR to extract the .zip file"
                printf '%s\n' "    • All parts will be combined automatically"
                printf '\n'
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '%s\n' "                    🏷️ Generated by AVASAM"
                printf '%s\n' "                      https://avasam.ir"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
              } > "$INFO_FILE"

              echo "📄 Created INFO.txt in videos/${FILENAME_NO_EXT}/"

            else
              cp "$FILE" "videos/$BASENAME"
              echo "✅ Copied as-is (no split needed)"

              # For non-split files, create a simple info file in videos folder
              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
              FILE_ENCODED=$(echo "${BASENAME}" | sed 's/ /%20/g')
              RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FILE_ENCODED}"

              # Create info file for single file using printf
              INFO_FILE="videos/${FILENAME_NO_EXT}_INFO.txt"
              {
                printf '%s\n' "╔══════════════════════════════════════════════════════════════════╗"
                printf '%s\n' "║                    🎬 AVASAM YouTube Downloader                   ║"
                printf '%s\n' "║                       https://avasam.ir                           ║"
                printf '%s\n' "╚══════════════════════════════════════════════════════════════════╝"
                printf '\n'
                printf '%s\n' "📹 VIDEO INFORMATION"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '\n'
                printf '%s\n' "1️⃣  Video Name"
                printf '%s\n' "    ${FILENAME_NO_EXT}"
                printf '\n'
                printf '%s\n' "2️⃣  Original YouTube Link"
                printf '%s\n' "    ${URL}"
                printf '\n'
                printf '%s\n' "3️⃣  Total Downloaded Size"
                printf '%s\n' "    📦 1 file (no split needed) | 💾 Total: ${SIZE_MB} MB"
                printf '\n'
                printf '%s\n' "4️⃣  Video Quality"
                printf '%s\n' "    🎯 ${QUALITY}"
                printf '\n'
                printf '%s\n' "5️⃣  Download Link (GitHub Raw)"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '%s\n' "${RAW_LINK}"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '\n'
                printf '%s\n' "6️⃣  Download Status"
                printf '%s\n' "    ✅ 100% Downloaded - Complete!"
                printf '\n'
                printf '%s\n' "    Progress: [████████████████████] 100%"
                printf '\n'
                printf '%s\n' "    ✅ File downloaded successfully!"
                printf '%s\n' "    ✅ Ready to use - no extraction needed!"
                printf '\n'
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
                printf '%s\n' "                    🏷️ Generated by AVASAM"
                printf '%s\n' "                      https://avasam.ir"
                printf '%s\n' "═══════════════════════════════════════════════════════════════════"
              } > "$INFO_FILE"

              echo "📄 Created ${FILENAME_NO_EXT}_INFO.txt"
            fi
          done
          rm -rf tmp_downloads

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🏷️  AVASAM (https://avasam.ir) - Preparing to commit files"

          # Check if videos folder has any files
          if [ ! -d "videos" ] || [ -z "$(ls -A videos 2>/dev/null)" ]; then
            echo "❌ No files to commit in videos folder"
            exit 1
          fi

          # Collect all new/modified files
          mapfile -t ALL_FILES < <(find videos -type f -name "*")

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "🚀 Pushing batch $BATCH_NUM: files $((i+1))–$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "[AVASAM] YouTube download — batch $BATCH_NUM [skip ci]"

            # Pull with rebase before each push
            git pull --rebase origin "$BRANCH" || true
            git push origin HEAD:"$BRANCH"

            echo "✅ Batch $BATCH_NUM pushed"
          done

          echo "🎉 All $TOTAL files pushed — AVASAM (https://avasam.ir)"
